# =========================
# 全局配置文件
# =========================

# 项目根目录
BASE_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

# 仓库列表
REPO_LIST="$BASE_DIR/repos.txt"

# 单仓备份脚本（⚠️ 改脚本名只改这里）
#BACKUP_SCRIPT="$BASE_DIR/scripts/2601010724backup_one.sh"
BACKUP_SCRIPT="$BASE_DIR/backup_one.sh"

# 你的“集中备份仓库”
BACKUP_REPO="https://github.com/zchhh17/251231-github-backup.git"

# 工作目录
WORK_DIR="$BASE_DIR/work"

# Git
GIT_BIN="$(command -v git)"

# 时间格式
TIME_FMT="%Y%m%d-%H%M%S"

# 模式控制
DRY_RUN=0        # 1 = 只演练不执行
SINGLE_REPO="edgetunnel"   # 填仓库名可只跑一个（如 edgetunnel）
