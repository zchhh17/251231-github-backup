name: GitHub Repos Backup

on:
  # 每天自动执行一次（UTC 01:00 ≈ 北京时间 09:00）
  schedule:
    - cron: '0 1 * * *'

  # 允许你在 Actions 页面手动点 Run
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 必须，否则 tag / commit 可能失败

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Make scripts executable
        run: |
          chmod +x backup_all.sh backup_one.sh

      - name: Run backup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./backup_all.sh
