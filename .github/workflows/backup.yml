name: GitHub Repos Backup

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

# ⭐⭐⭐ 关键：给 Actions 写权限 ⭐⭐⭐
permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Make scripts executable
        run: |
          chmod +x backup_all.sh backup_one.sh

      - name: Run backup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./backup_all.sh
