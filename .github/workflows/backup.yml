name: GitHub Backup

on:
  schedule:
    - cron: '0 1 * * *'   # 每天一次（UTC）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run backup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x backup_all.sh backup_one.sh
          ./backup_all.sh
