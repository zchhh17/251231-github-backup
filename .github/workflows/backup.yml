name: GitHub Backup (B scheme)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'   # 每天 UTC 03:00

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backup repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 保证 tag / log 正常

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Run backup scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          chmod +x scripts/*.sh
          ./scripts/backup_all.sh

      - name: Generate HTML pages
        run: |
          chmod +x scripts/generate_html.sh
          ./scripts/generate_html.sh

      - name: Upload index.json to Release
        run: |
          chmod +x scripts/upload_index_release.sh
          ./scripts/upload_index_release.sh

      - name: Commit results (safe paths only)
        run: |
          git status
          git add index.json public work/backup-repo
          git commit -m "chore: auto backup $(date -u '+%F %T')" || echo "No changes"
          git push
